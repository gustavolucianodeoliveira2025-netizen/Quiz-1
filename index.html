<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Mente Divina de Ramanujan — O Desafio dos Números</title>
    <style>
        :root {
            --primary: #1a237e;
            --accent: #ffd700;
            --bg-dark: #0a0e1a;
            --card-bg: #13192e;
            --text: #ffffff;
            --text-secondary: #a0aec0;
            --notebook-bg: #120e0a;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at 50% 50%, #1e295d 0%, #0a0e1a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            color: var(--text);
            overflow-x: hidden;
            position: relative;
        }

        /* Fundo Animado com Símbolos */
        .math-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 1;
            pointer-events: none;
        }

        .math-element {
            position: absolute;
            color: rgba(255, 231, 92, 0.04);
            font-family: 'Courier New', monospace;
            font-size: 24px;
            font-weight: bold;
            user-select: none;
            animation: floatUp 14s linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(105vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        .game-layout {
            display: flex;
            gap: 25px;
            max-width: 1000px;
            width: 100%;
            z-index: 2;
            position: relative;
        }

        /* O CADERNO */
        .notebook {
            flex: 1;
            background: linear-gradient(135deg, #1d1710 0%, #120e0a 100%);
            border: 4px solid #8B5A2B;
            border-radius: 15px;
            padding: 25px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8), 0 10px 25px rgba(0,0,0,0.5);
            max-height: 570px;
            overflow-y: auto;
            position: relative;
        }

        .notebook::before {
            content: '';
            position: absolute;
            left: 10px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: rgba(139, 90, 43, 0.4);
        }

        .notebook h3 {
            color: var(--accent);
            font-family: 'Georgia', serif;
            margin-top: 0;
            border-bottom: 1px dashed rgba(255,215,0,0.3);
            padding-bottom: 10px;
            text-align: center;
        }

        .formula-entry {
            font-family: 'Courier New', monospace;
            color: #ffe066;
            background: rgba(255, 215, 0, 0.05);
            padding: 10px;
            margin-bottom: 12px;
            border-radius: 5px;
            border-left: 3px solid var(--accent);
            font-size: 14px;
            animation: writeIn 0.5s ease forwards;
            white-space: pre-line;
            word-break: break-word;
        }

        @keyframes writeIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* CONTAINER DO QUIZ */
        .container {
            flex: 1.3;
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            border: 2px solid rgba(255, 215, 0, 0.2);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .shake { animation: shakeAnim 0.4s ease; }
        @keyframes shakeAnim {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-8px); }
            40%, 80% { transform: translateX(8px); }
        }

        .progress-bar-container {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--accent), #ffa500);
            transition: width 0.4s ease;
        }

        h1 { color: var(--accent); margin-top: 0; font-size: 26px; line-height: 1.3; }
        p { color: var(--text-secondary); line-height: 1.6; font-size: 15px; text-align: justify; }

        .story-box {
            background: rgba(26, 35, 126, 0.3);
            border-left: 4px solid var(--accent);
            padding: 15px;
            margin: 20px 0;
            border-radius: 0 10px 10px 0;
            text-align: left;
        }

        .rules-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            text-align: left;
        }

        .rules-box h4 { margin-top: 0; color: var(--text); margin-bottom: 8px; }

        .btn {
            background: linear-gradient(135deg, var(--primary) 0%, #283593 100%);
            color: white;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 14px 24px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            margin-bottom: 12px;
            word-wrap: break-word;
            white-space: normal;
        }

        .btn:hover:not(:disabled) { 
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.15);
            border-color: var(--accent);
        }

        .btn:disabled { background: #1e2538; color: #555c70; border-color: transparent; cursor: not-allowed; }
        .option-btn { text-align: left; padding-left: 20px; background: #1a2036; }

        .timer {
            font-size: 16px;
            font-weight: bold;
            color: var(--accent);
            border: 2px solid var(--accent);
            padding: 4px 12px;
            border-radius: 30px;
            background-color: rgba(0,0,0,0.3);
            white-space: nowrap;
        }

        .feedback-overlay {
            font-size: 16px;
            font-weight: bold;
            margin: 15px 0;
            padding: 12px;
            border-radius: 10px;
        }
        
        .correct-msg { color: #4ade80; border: 2px solid #4ade80; background: rgba(74, 222, 128, 0.1); }
        .wrong-msg { color: #f87171; border: 2px solid #f87171; background: rgba(248, 113, 113, 0.1); }
        .hidden { display: none !important; }

        @media (max-width: 768px) {
            .game-layout { flex-direction: column; }
            .notebook { max-height: 200px; }
        }
    </style>
</head>
<body>

<div class="math-bg" id="math-bg"></div>

<div class="game-layout">
    <div class="notebook">
        <h3>📖 Caderno de Fórmulas</h3>
        <div id="notebook-content">
            <p id="placeholder-text" style="text-align: center; color: #888; font-style: italic;">Acerte as questões para decifrar os segredos e teoremas ocultos de Ramanujan aqui...</p>
        </div>
    </div>

    <div class="container" id="quiz-container">
        <div id="screen-intro">
            <h1>✨ A Mente Divina de Ramanujan — O Desafio dos Números</h1>
            
            <div class="story-box">
                <p><strong>A História do Gênio:</strong> Em 1918
